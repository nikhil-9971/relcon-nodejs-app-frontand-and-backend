<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELCON | Smart CRM Dashboard</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --sidebar-width: 260px;
        --primary: #4f46e5; /* Indigo 600 */
        --primary-hover: #4338ca;
        --bg-main: #f8fafc;
        --sidebar-bg: #ffffff;
        --text-main: #1e293b;
      }

      .dark {
        --bg-main: #020617;
        --sidebar-bg: #0f172a;
        --text-main: #f1f5f9;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        transition: all 0.3s ease;
        overflow: hidden;
      }

      /* Sidebar Styling */
      .sidebar {
        width: var(--sidebar-width);
        background-color: var(--sidebar-bg);
        border-right: 1px solid rgba(0, 0, 0, 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dark .sidebar {
        border-right: 1px solid #1e293b;
      }

      .nav-link {
        display: flex;
        align-items: center;
        padding: 0.6rem 1rem;
        margin: 0.2rem 0.75rem;
        border-radius: 0.5rem;
        color: #64748b;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .nav-link i {
        width: 20px;
        font-size: 16px;
        margin-right: 12px;
      }

      .nav-link:hover {
        background-color: #f1f5f9;
        color: var(--primary);
      }

      .dark .nav-link:hover {
        background-color: #1e293b;
        color: #818cf8;
      }

      .nav-link.active {
        background-color: var(--primary);
        color: white !important;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      }

      .menu-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin: 1.5rem 1.5rem 0.5rem;
      }

      /* Top Bar */
      .topbar {
        height: 64px;
        background-color: var(--sidebar-bg);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
      }
      .dark .topbar {
        border-bottom: 1px solid #1e293b;
      }

      /* Content Area */
      iframe {
        width: 100%;
        height: calc(100vh - 64px);
        border: none;
        background: transparent;
      }

      /* Professional Chat UI */
      #chatToggle {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 56px;
        height: 56px;
        background: var(--primary);
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        z-index: 100;
        transition: transform 0.2s;
      }
      #chatToggle:hover {
        transform: scale(1.1);
      }

      .search-input {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        padding: 0.4rem 1rem 0.4rem 2.5rem;
        border-radius: 0.75rem;
        font-size: 13px;
        width: 300px;
        outline: none;
      }
      .dark .search-input {
        background: #1e293b;
        border-color: #334155;
        color: white;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="flex">
    <!-- Sidebar -->
    <aside class="sidebar h-screen flex flex-col fixed lg:relative z-50">
      <div class="h-16 flex items-center px-6 gap-3">
        <div
          class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold"
        >
          R
        </div>
        <span
          class="text-lg font-bold tracking-tight text-slate-800 dark:text-white"
          >RELCON <span class="text-indigo-600">PRO</span></span
        >
      </div>

      <div class="flex-1 overflow-y-auto mt-4">
        <p class="menu-label">Main Console</p>
        <a href="#" onclick="loadPage('overview.html', this)" class="nav-link">
          <i class="fa-solid fa-house"></i> Dashboard
        </a>
        <a
          href="#"
          onclick="loadPage('dailyPlan.html', this)"
          class="nav-link active"
        >
          <i class="fa-solid fa-calendar-check"></i> Daily Plan
        </a>

        <p class="menu-label">Intelligence & Reports</p>
        <a
          href="#"
          onclick="loadPage('reportsOverview.html', this)"
          class="nav-link"
        >
          <i class="fa-solid fa-chart-pie"></i> Reports Center
        </a>
        <a
          href="#"
          onclick="loadPage('statusRecords.html', this)"
          id="statusLink"
          class="nav-link"
        >
          <i class="fa-solid fa-server"></i> HPCL Status
        </a>
        <a
          href="#"
          onclick="loadPage('taskReport.html', this)"
          id="taskLink"
          class="nav-link"
        >
          <i class="fa-solid fa-clipboard-list"></i> Task Manager
        </a>

        <p class="menu-label">Field Operations</p>
        <a href="#" onclick="loadPage('romaster.html', this)" class="nav-link">
          <i class="fa-solid fa-database"></i> RO Master
        </a>
        <a
          href="#"
          onclick="loadPage('materialrequirement.html', this)"
          class="nav-link"
        >
          <i class="fa-solid fa-box"></i> Materials
        </a>
        <a
          href="#"
          onclick="loadPage('incident.html', this)"
          id="incidentLink"
          class="nav-link"
        >
          <i class="fa-solid fa-triangle-exclamation"></i> Incidents
        </a>

        <p id="adminLabel" class="menu-label hidden">Administrative</p>
        <a
          href="#"
          id="auditLink"
          onclick="loadPage('auditReport.html', this)"
          class="nav-link hidden"
        >
          <i class="fa-solid fa-shield-check"></i> Audit Logs
        </a>
      </div>

      <div class="p-4 border-t dark:border-slate-800">
        <div
          id="userProfile"
          class="flex items-center gap-3 p-2 rounded-lg bg-slate-50 dark:bg-slate-900/50 mb-3"
        >
          <div
            class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold"
          >
            U
          </div>
          <div class="overflow-hidden">
            <p id="userName" class="text-xs font-bold truncate">Loading...</p>
            <p id="userRole" class="text-[10px] text-slate-500 uppercase">
              User
            </p>
          </div>
        </div>
        <button
          onclick="logout()"
          class="w-full flex items-center justify-center gap-2 py-2 px-4 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg text-xs font-bold transition"
        >
          <i class="fa-solid fa-right-from-bracket"></i> Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Section -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Topbar -->
      <header class="topbar">
        <div class="flex items-center gap-4">
          <button class="lg:hidden text-slate-500">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
          </button>
          <div class="relative hidden md:block">
            <i
              class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"
            ></i>
            <input
              type="text"
              placeholder="Search records, ROs or tasks..."
              class="search-input"
            />
          </div>
        </div>

        <div class="flex items-center gap-5">
          <!-- Theme Toggle -->
          <button
            onclick="toggleTheme()"
            class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300"
          >
            <i id="themeIcon" class="fa-solid fa-moon"></i>
          </button>

          <!-- Notifications -->
          <button
            class="relative w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300"
          >
            <i class="fa-solid fa-bell"></i>
            <span
              class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dark:border-slate-800"
            ></span>
          </button>

          <!-- Profile Mobile -->
          <div
            class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold md:hidden"
          >
            U
          </div>
        </div>
      </header>

      <!-- Main Workspace -->
      <main class="flex-1 relative">
        <iframe id="contentFrame" src="dailyPlan.html"></iframe>
      </main>
    </div>

    <!-- Floating Actions -->
    <div id="chatToggle" onclick="toggleChat()">
      <i class="fa-solid fa-comment-dots text-xl"></i>
    </div>

    <!-- Scripting Dashboard Logic -->
    <script>
      const baseUrl = "https://relcon-backend-jwt-backup.onrender.com";
      const token = localStorage.getItem("token");

      // Theme Toggle
      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        document.getElementById("themeIcon").className = isDark
          ? "fa-solid fa-sun"
          : "fa-solid fa-moon";
        syncIframeTheme();
      }

      // Apply saved theme
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
        document.getElementById("themeIcon").className = "fa-solid fa-sun";
      }

      function syncIframeTheme() {
        const iframe = document.getElementById("contentFrame");
        try {
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (document.documentElement.classList.contains("dark"))
            doc.documentElement.classList.add("dark");
          else doc.documentElement.classList.remove("dark");
        } catch (e) {}
      }

      // Page Loader
      function loadPage(url, el) {
        document
          .querySelectorAll(".nav-link")
          .forEach((link) => link.classList.remove("active"));
        if (el) el.classList.add("active");

        const frame = document.getElementById("contentFrame");
        frame.src = url + "?cb=" + Date.now();

        frame.onload = () => syncIframeTheme();
      }

      // Auth & User Logic
      async function initDashboard() {
        if (!token) return (window.location.href = "login.html");

        try {
          const res = await fetch(`${baseUrl}/user`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const user = await res.json();

          document.getElementById("userName").innerText =
            user.engineerName || user.username;
          document.getElementById("userRole").innerText = user.role;

          // Role-based UI
          if (user.role === "admin") {
            document.getElementById("statusLink").style.display = "flex";
            document.getElementById("taskLink").style.display = "flex";
            document.getElementById("incidentLink").style.display = "flex";
            document.getElementById("adminLabel").classList.remove("hidden");
            if (user.username === "nikhil.trivedi") {
              document.getElementById("auditLink").classList.remove("hidden");
              document.getElementById("auditLink").style.display = "flex";
            }
          }
        } catch (e) {
          logout();
        }
      }

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }

      function toggleChat() {
        // Your existing chat toggle logic here
        alert("Chat Panel Opening...");
      }

      initDashboard();
    </script>
  </body>
</html>
