<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <title>RELCON SYSTEMS | Enterprise CRM</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/emoji-button.min.js"></script>

    <style>
      :root {
        --sf-blue: #0176d3;
        --sf-navy: #001639;
        --sf-bg: #f3f3f2;
        --sf-border: #dddbda;
        --sidebar-w: 260px;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--sf-bg);
        color: #181818;
        font-size: 13px;
        overflow: hidden;
      }

      /* Sidebar Salesforce Style */
      .sidebar {
        width: var(--sidebar-w);
        background: #ffffff;
        border-right: 1px solid var(--sf-border);
        z-index: 50;
      }

      .nav-link {
        display: flex;
        align-items: center;
        padding: 0.6rem 1.25rem;
        margin: 0.15rem 0.5rem;
        border-radius: 4px;
        color: #444;
        transition: all 0.2s;
        cursor: pointer;
      }

      .nav-link i {
        width: 22px;
        font-size: 14px;
        color: #706e6b;
      }
      .nav-link:hover {
        background-color: #f3f3f2;
        color: var(--sf-blue);
      }

      .active-link {
        background-color: #eaf5fe !important;
        color: var(--sf-blue) !important;
        font-weight: 600;
        border-left: 3px solid var(--sf-blue);
      }
      .active-link i {
        color: var(--sf-blue);
      }

      .menu-category {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #706e6b;
        padding: 1.5rem 1.25rem 0.5rem;
      }

      /* Header Area */
      .top-header {
        height: 55px;
        background: #ffffff;
        border-bottom: 1px solid var(--sf-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 60;
      }

      .search-bar {
        background: #f3f3f2;
        border: 1px solid var(--sf-border);
        border-radius: 4px;
        padding: 4px 12px 4px 32px;
        font-size: 12px;
        width: 320px;
        outline: none;
      }

      /* Stylish Progress Bar */
      #progressBar {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 0%;
        background: #1589ee;
        z-index: 1000;
        transition: width 0.4s ease;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 55px);
        border: none;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }

      /* Floating Action Buttons */
      .fab-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        transition: transform 0.2s;
      }
      .fab-btn:hover {
        transform: scale(1.1);
      }

      /* Chat Styles */
      .msg {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .msg.me {
        background: #eaf5fe;
        align-self: flex-end;
        border-bottom-right-radius: 0;
      }
      .msg.them {
        background: #f3f3f2;
        align-self: flex-start;
        border-bottom-left-radius: 0;
      }
    </style>
  </head>

  <body class="flex flex-col h-screen">
    <div id="progressBar"></div>

    <!-- Header Section -->
    <header class="top-header">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <div class="bg-blue-600 p-1 rounded shadow-lg shadow-blue-200">
            <i class="fa-solid fa-bolt-lightning text-white text-lg"></i>
          </div>
          <span class="font-bold text-lg text-slate-800 tracking-tight"
            >RELCON <span class="text-blue-600">SYSTEMS</span></span
          >
        </div>

        <div class="relative hidden lg:block">
          <i
            class="fa-solid fa-magnifying-glass absolute left-3 top-2 text-slate-400 text-xs"
          ></i>
          <input
            type="text"
            placeholder="Search Sites, Reports or Tasks..."
            class="search-bar"
          />
        </div>
      </div>

      <div class="flex items-center gap-4">
        <span
          class="text-[10px] font-bold text-slate-400 border-r pr-4 border-slate-200 uppercase tracking-widest"
          >Build 27.10.25</span
        >
        <div
          id="userDetails"
          class="text-[12px] font-semibold text-slate-700 flex items-center gap-2"
        >
          <div
            class="w-8 h-8 bg-blue-100 text-blue-600 flex items-center justify-center rounded-full font-bold"
          >
            U
          </div>
          <span>Loading Profile...</span>
        </div>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar Navigation -->
      <aside id="sidebar" class="sidebar flex flex-col h-full overflow-hidden">
        <nav class="flex-1 overflow-y-auto custom-scrollbar">
          <p class="menu-category">General</p>
          <a onclick="loadPage('overview.html', this)" class="nav-link">
            <i class="fa-solid fa-gauge-high"></i> <span>Dashboard Home</span>
          </a>
          <a
            onclick="loadPage('dailyPlan.html', this)"
            class="nav-link active-link"
          >
            <i class="fa-solid fa-calendar-check"></i>
            <span>Daily Visit Plan</span>
          </a>

          <p class="menu-category">Intelligence</p>
          <button
            onclick="loadPage('reportsOverview.html', this)"
            class="nav-link w-[calc(100%-1rem)]"
          >
            <i class="fa-solid fa-folder-tree"></i> <span>Report Center</span>
          </button>
          <a
            id="statusLink"
            onclick="loadPage('statusRecords.html', this)"
            class="nav-link hidden"
          >
            <i class="fa-solid fa-database"></i> <span>HPCL Status</span>
          </a>
          <a
            id="tasklink"
            onclick="loadPage('taskReport.html', this)"
            class="nav-link hidden"
          >
            <i class="fa-solid fa-list-check"></i> <span>Task Report</span>
          </a>

          <p class="menu-category">Field Ops</p>
          <a
            id="taskManagementLink"
            onclick="loadPage('taskManager.html', this)"
            class="nav-link hidden"
          >
            <i class="fa-solid fa-tasks"></i> <span>Task Management</span>
          </a>
          <a
            id="incidentId"
            onclick="loadPage('incident.html', this)"
            class="nav-link hidden"
          >
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Incidents</span>
          </a>
          <a onclick="loadPage('romaster.html', this)" class="nav-link">
            <i class="fa-solid fa-building-circle-check"></i>
            <span>RO Master</span>
          </a>
          <a
            onclick="loadPage('materialrequirement.html', this)"
            class="nav-link"
          >
            <i class="fa-solid fa-box-open"></i> <span>Material Tracking</span>
          </a>

          <p id="adminLabel" class="menu-category hidden">Governance</p>
          <a
            id="auditLink"
            onclick="loadPage('auditReport.html', this)"
            class="nav-link hidden"
          >
            <i class="fa-solid fa-shield-halved"></i> <span>Audit Logs</span>
          </a>
        </nav>

        <!-- Bottom Control -->
        <div class="p-4 bg-slate-50 border-t">
          <button
            id="addSiteBtn"
            onclick="openNewSiteModal()"
            class="hidden w-full mb-3 bg-white border border-blue-600 text-blue-600 py-2 rounded font-bold text-[11px] hover:bg-blue-50 transition uppercase"
          >
            + Add New Site
          </button>
          <button
            onclick="logout()"
            class="w-full bg-rose-600 text-white py-2 rounded font-bold text-[11px] hover:bg-rose-700 transition uppercase"
          >
            Logout
          </button>
        </div>
      </aside>

      <!-- Main Workspace -->
      <main class="flex-1 relative bg-white">
        <iframe id="contentFrame" src="dailyPlan.html"></iframe>
      </main>
    </div>

    <!-- Modals Section -->
    <div
      id="newSiteModal"
      class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100]"
    >
      <div class="bg-white rounded-lg w-full max-w-2xl shadow-2xl border">
        <div
          class="px-6 py-4 border-b flex justify-between items-center bg-slate-50 rounded-t-lg"
        >
          <h2 class="text-sm font-bold text-slate-800">ADD NEW SITE RECORD</h2>
          <button
            onclick="closeNewSiteModal()"
            class="text-slate-400 hover:text-slate-800"
          >
            ✕
          </button>
        </div>
        <div class="p-6 grid grid-cols-2 gap-4 text-xs">
          <div>
            <label class="font-bold text-slate-500 uppercase block mb-1"
              >Zone</label
            >
            <select
              id="newZone"
              class="w-full border p-2 rounded outline-blue-500"
            >
              <option>ECZ</option>
              <option>NCZ</option>
            </select>
          </div>
          <div>
            <label class="font-bold text-slate-500 uppercase block mb-1"
              >RO Code</label
            >
            <input
              id="newRoCode"
              type="text"
              class="w-full border p-2 rounded outline-blue-500"
            />
          </div>
          <div class="col-span-2">
            <label class="font-bold text-slate-500 uppercase block mb-1"
              >RO Name</label
            >
            <input
              id="newRoName"
              type="text"
              class="w-full border p-2 rounded uppercase outline-blue-500"
            />
          </div>
          <div>
            <label class="font-bold text-slate-500 uppercase block mb-1"
              >Region</label
            >
            <select
              id="newRegion"
              class="w-full border p-2 rounded outline-blue-500"
            >
              <option>BEGUSARAI RET RO</option>
              <option>PATNA RET RO</option>
              <option>LUCKNOW RET RO</option>
            </select>
          </div>
          <div>
            <label class="font-bold text-slate-500 uppercase block mb-1"
              >Phase</label
            >
            <select
              id="newPhase"
              class="w-full border p-2 rounded outline-blue-500"
            >
              <option>HPCL/Phase-X</option>
              <option>RBML</option>
            </select>
          </div>
        </div>
        <div
          class="p-4 bg-slate-50 border-t flex justify-end gap-3 rounded-b-lg"
        >
          <button
            onclick="closeNewSiteModal()"
            class="px-4 py-1.5 border rounded font-semibold text-slate-600"
          >
            Cancel
          </button>
          <button
            onclick="submitNewSite()"
            class="px-6 py-1.5 bg-blue-600 text-white rounded font-semibold hover:bg-blue-700"
          >
            Save Record
          </button>
        </div>
      </div>
    </div>

    <!-- Floating Buttons -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-3 z-[1000]">
      <div
        onclick="toggleAIChat()"
        class="fab-btn bg-white border border-slate-200 text-2xl"
      >
        🤖
      </div>
      <div onclick="openChatBox()" class="fab-btn bg-blue-600 text-white">
        <i class="fa-solid fa-comments text-xl"></i>
        <span
          id="mentionBadge"
          class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white hidden"
          >0</span
        >
      </div>
    </div>

    <!-- AI & Chat Logic Blocks -->
    <div
      id="aiChatBox"
      class="hidden fixed bottom-24 right-6 w-80 h-[450px] bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col z-[1000] border"
    >
      <div
        class="p-4 bg-emerald-600 text-white flex justify-between items-center font-bold"
      >
        <span>🤖 AI Assistant</span><button onclick="toggleAIChat()">✕</button>
      </div>
      <div
        id="aiMessages"
        class="flex-1 p-4 overflow-y-auto bg-slate-50 space-y-3"
      ></div>
      <div class="p-3 border-t flex gap-2">
        <input
          id="aiInput"
          type="text"
          placeholder="Ask AI..."
          class="flex-1 p-2 border rounded-lg text-xs outline-none"
        /><button
          onclick="sendAIMessage()"
          class="bg-emerald-600 text-white p-2 rounded-lg px-3"
        >
          ➤
        </button>
      </div>
    </div>

    <div
      id="chatBox"
      class="hidden fixed bottom-24 right-6 w-[350px] h-[500px] bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col z-[1000] border"
    >
      <div
        class="p-4 bg-blue-600 text-white flex justify-between items-center font-bold"
      >
        <span><i class="fa-solid fa-users mr-2"></i> TEAM CHAT</span
        ><button
          onclick="document.getElementById('chatBox').style.display = 'none'"
        >
          ✕
        </button>
      </div>
      <div
        id="typingIndicator"
        class="text-[10px] italic px-4 text-blue-600 h-4 mt-1"
      ></div>
      <div
        id="chatMessages"
        class="flex-1 p-4 overflow-y-auto flex flex-col gap-2"
      ></div>
      <div
        id="replyBox"
        class="hidden mx-4 my-1 p-2 bg-yellow-50 text-[10px] rounded border-l-4 border-yellow-400"
      ></div>
      <div class="p-3 border-t flex gap-2 items-center">
        <button id="emojiBtn" class="text-xl">😊</button>
        <input
          id="chatInput"
          type="text"
          placeholder="Type message..."
          class="flex-1 bg-slate-100 rounded-lg p-2 text-xs outline-none"
        />
        <button
          id="sendBtn"
          class="bg-blue-600 text-white w-9 h-9 flex items-center justify-center rounded-lg shadow-md"
        >
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Core Scripts -->
    <script>
      const baseUrl = "https://relcon-backend-jwt-backup.onrender.com";
      const token = localStorage.getItem("token");

      // Page Logic
      function loadPage(page, el) {
        const bar = document.getElementById("progressBar");
        bar.style.width = "70%";
        bar.style.opacity = "1";
        const iframe = document.getElementById("contentFrame");
        iframe.src = page + "?cb=" + Date.now();
        document
          .querySelectorAll(".nav-link")
          .forEach((l) => l.classList.remove("active-link"));
        if (el) el.classList.add("active-link");
        iframe.onload = () => {
          bar.style.width = "100%";
          setTimeout(() => {
            bar.style.opacity = "0";
            bar.style.width = "0";
          }, 500);
        };
      }

      async function fetchUser() {
        if (!token) return logout();
        try {
          const res = await fetch(`${baseUrl}/user`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.status === 403 || res.status === 401)
            throw new Error("Expired");
          const user = await res.json();
          document
            .getElementById("userDetails")
            .querySelector("span").innerText =
            `${user.engineerName || user.username} (${user.role})`;

          if (user.role === "admin") {
            document.getElementById("statusLink").classList.remove("hidden");
            document.getElementById("tasklink").classList.remove("hidden");
            document
              .getElementById("taskManagementLink")
              .classList.remove("hidden");
            document.getElementById("incidentId").classList.remove("hidden");
            document.getElementById("addSiteBtn").classList.remove("hidden");
            document.getElementById("adminLabel").classList.remove("hidden");
            if (user.engineerName === "Nikhil Trivedi")
              document.getElementById("auditLink").classList.remove("hidden");
          }
        } catch {
          logout();
        }
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
      }
      function openNewSiteModal() {
        document.getElementById("newSiteModal").classList.remove("hidden");
      }
      function closeNewSiteModal() {
        document.getElementById("newSiteModal").classList.add("hidden");
      }

      window.onload = () => {
        fetchUser();
        initWS();
        fetchUserListForMention();
      };

      // Team Chat & AI Integration (All existing WebSocket functionality)
      let ws,
        currentUser,
        unreadsMentionCount = 0;
      function initWS() {
        if (!token) return;
        const p = JSON.parse(atob(token.split(".")[1]));
        currentUser = (p.engineerName || p.username || "").trim();
        ws = new WebSocket(
          `wss://relcon-backend-jwt-backup.onrender.com?token=${encodeURIComponent(token)}`,
        );
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === "group" && msg.from !== currentUser)
            renderMessage(msg);
          if (msg.type === "typing" && msg.from !== currentUser) {
            document.getElementById("typingIndicator").innerText =
              `${msg.from} is typing...`;
            setTimeout(
              () => (document.getElementById("typingIndicator").innerText = ""),
              2000,
            );
          }
        };
      }

      function openChatBox() {
        document.getElementById("chatBox").style.display = "flex";
        unreadsMentionCount = 0;
        document.getElementById("mentionBadge").style.display = "none";
        const m = document.getElementById("chatMessages");
        m.scrollTop = m.scrollHeight;
      }

      function renderMessage(msg) {
        const chatMessages = document.getElementById("chatMessages");
        const div = document.createElement("div");
        const isOwn = msg.from === currentUser;
        div.className = "msg " + (isOwn ? "me" : "them");
        div.innerHTML = `<div class="text-[9px] font-bold text-blue-700">${msg.from}</div><div>${msg.text}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      document.getElementById("sendBtn").onclick = () => {
        const inp = document.getElementById("chatInput");
        if (!inp.value.trim()) return;
        const payload = {
          type: "group",
          from: currentUser,
          text: inp.value,
          createdAt: new Date().toISOString(),
        };
        ws.send(JSON.stringify(payload));
        renderMessage(payload);
        inp.value = "";
      };

      function toggleAIChat() {
        document.getElementById("aiChatBox").classList.toggle("hidden");
      }

      async function sendAIMessage() {
        const inp = document.getElementById("aiInput");
        const msg = inp.value.trim();
        if (!msg) return;
        const aiMessages = document.getElementById("aiMessages");
        aiMessages.innerHTML += `<div class="text-right"><span class="bg-blue-600 text-white p-2 rounded-lg inline-block">${msg}</span></div>`;
        inp.value = "";
        try {
          const res = await fetch(`${baseUrl}/ai/ask`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ question: msg }),
          });
          const data = await res.json();
          aiMessages.innerHTML += `<div class="flex gap-2"><div class="w-6 h-6 bg-emerald-600 text-white rounded-full flex items-center justify-center text-[10px]">AI</div><div class="bg-white border p-2 rounded-lg text-slate-700">${data.reply}</div></div>`;
        } catch {
          aiMessages.innerHTML += `<div class="text-center text-red-500 text-[10px]">AI Offline</div>`;
        }
        aiMessages.scrollTop = aiMessages.scrollHeight;
      }

      // Mention / Emoji Dummy Stubs (As per Original Code functionality)
      function fetchUserListForMention() {}
    </script>
  </body>
</html>
