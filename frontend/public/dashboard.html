<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <title>RELCON SYSTEMS | Pro CRM</title>

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/emoji-button.min.js"></script>

    <style>
      :root {
        --sf-blue: #0176d3;
        --sf-bg: #f3f3f2;
        --sf-border: #dddbda;
        --sidebar-w: 260px;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--sf-bg);
        color: #181818;
        font-size: 13px;
        overflow: hidden;
      }

      /* Sidebar Responsive Logic */
      .sidebar {
        width: var(--sidebar-w);
        background: #ffffff;
        border-right: 1px solid var(--sf-border);
        transition: transform 0.3s ease-in-out;
        z-index: 100;
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          height: 100%;
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 90;
        }
        .sidebar-overlay.show {
          display: block;
        }
      }

      .nav-link {
        display: flex;
        align-items: center;
        padding: 0.6rem 1.25rem;
        margin: 0.15rem 0.5rem;
        border-radius: 4px;
        color: #444;
        transition: all 0.2s;
        cursor: pointer;
      }
      .nav-link i {
        width: 22px;
        font-size: 14px;
        color: #706e6b;
      }
      .nav-link:hover {
        background-color: #f3f3f2;
        color: var(--sf-blue);
      }
      .active-link {
        background-color: #eaf5fe !important;
        color: var(--sf-blue) !important;
        font-weight: 600;
        border-left: 3px solid var(--sf-blue);
      }

      .menu-category {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #706e6b;
        padding: 1.5rem 1.25rem 0.5rem;
      }

      .top-header {
        height: 55px;
        background: #ffffff;
        border-bottom: 1px solid var(--sf-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        z-index: 60;
      }

      #progressBar {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 0%;
        background: #1589ee;
        z-index: 1000;
        transition: width 0.4s ease;
      }
      iframe {
        width: 100%;
        height: calc(100vh - 55px);
        border: none;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }

      .fab-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        transition: transform 0.2s;
      }
      .fab-btn:hover {
        transform: scale(1.1);
      }

      /* Modal Style */
      .modal-label {
        font-weight: 600;
        color: #4b5563;
        font-size: 11px;
        margin-bottom: 4px;
        display: block;
      }
      .modal-input {
        width: 100%;
        border: 1px solid #d1d5db;
        padding: 8px;
        border-radius: 6px;
        font-size: 12px;
        outline-color: var(--sf-blue);
      }

      /* Chat Styles */
      .msg {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 12px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .msg.me {
        background: #eaf5fe;
        align-self: flex-end;
        border-bottom-right-radius: 0;
      }
      .msg.them {
        background: #f3f3f2;
        align-self: flex-start;
        border-bottom-left-radius: 0;
      }
    </style>
  </head>

    <!-- Floating Buttons (AI & Chat) -->

    <!-- Core Scripts -->
    <script>
      const baseUrl = "https://relcon-backend-jwt-backup.onrender.com";
      const token = localStorage.getItem("token");

      function toggleSidebar() {
        const s = document.getElementById("sidebar");
        const o = document.getElementById("sidebarOverlay");
        s.classList.toggle("open");
        o.classList.toggle("show");
      }

      function loadPage(page, el) {
        const bar = document.getElementById("progressBar");
        bar.style.width = "70%";
        bar.style.opacity = "1";
        const iframe = document.getElementById("contentFrame");
        iframe.src = page + "?cb=" + Date.now();
        document
          .querySelectorAll(".nav-link")
          .forEach((l) => l.classList.remove("active-link"));
        if (el) el.classList.add("active-link");
        if (window.innerWidth < 768) toggleSidebar();
        iframe.onload = () => {
          bar.style.width = "100%";
          setTimeout(() => {
            bar.style.opacity = "0";
            bar.style.width = "0";
          }, 500);
        };
      }

      async function fetchUser() {
        if (!token) return logout();
        try {
          const res = await fetch(`${baseUrl}/user`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const user = await res.json();
          document
            .getElementById("userDetails")
            .querySelector("span").innerText =
            `${user.engineerName || user.username} (${user.role})`;

          if (user.role === "admin") {
            [
              "statusLink",
              "tasklink",
              "taskManagementLink",
              "incidentId",
              "addSiteBtn",
              "adminLabel",
            ].forEach((id) => {
              const el = document.getElementById(id);
              if (el) el.classList.remove("hidden");
            });
            if (user.engineerName === "Nikhil Trivedi")
              document.getElementById("auditLink").classList.remove("hidden");
          }
        } catch {
          logout();
        }
      }

      async function submitNewSite() {
        const zone = document.getElementById("newZone").value;
        const roCode = document.getElementById("newRoCode").value;
        const roName = document.getElementById("newRoName").value;
        const region = document.getElementById("newRegion").value;
        const phase = document.getElementById("newPhase").value;
        const engineer = document.getElementById("newEngineer").value;
        const amcQtr = document.getElementById("newAmcQtr").value;
        const siteStatus = document.getElementById("newsiteStatus").value;

        if (
          !zone ||
          !roCode ||
          !roName ||
          !region ||
          !phase ||
          !engineer ||
          !amcQtr ||
          !siteStatus
        ) {
          alert("❌ All fields are required");
          return;
        }

        try {
          const res = await fetch(`${baseUrl}/romaster/add`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              zone,
              roCode,
              roName,
              region,
              phase,
              engineer,
              amcQtr,
              siteStatus,
            }),
          });
          if (res.ok) {
            alert("✅ Site added successfully!");
            closeNewSiteModal();
          } else {
            const data = await res.json();
            alert("❌ " + data.message);
          }
        } catch {
          alert("❌ Server error");
        }
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
      }
      function openNewSiteModal() {
        document.getElementById("newSiteModal").classList.remove("hidden");
      }
      function closeNewSiteModal() {
        document.getElementById("newSiteModal").classList.add("hidden");
      }

      window.onload = () => {
        fetchUser();
      };

      // Dummy/Logic Stubs for AI/Chat (Add your original functions here)

      function toggleAIChat() {
        const box = document.getElementById("aiChatBox");
        const messages = document.getElementById("aiMessages");

        if (box.style.display === "none" || box.style.display === "") {
          box.style.display = "flex";

          // 🌟 Check if greeting is already there, if not, add it
          if (messages.children.length <= 1) {
            const hour = new Date().getHours();
            let greetText =
              hour < 12
                ? "Good Morning"
                : hour < 17
                  ? "Good Afternoon"
                  : "Good Evening";

            messages.innerHTML = `
        <div style="margin-bottom:20px; border-left: 4px solid #16a34a; padding-left:12px; animation: fadeIn 0.5s;">
          <div style="font-weight:600; color:#16a34a; font-size:15px;">${greetText}, Admin</div>
          <div style="font-size:12px; color:#374151; margin-top:5px; line-height:1.5;">
            Welcome to <b>RELCON AI Intelligence</b>. Main aapke database se live reports aur site analytics nikaal sakta hoon.
          </div>
          
          <div style="margin-top:12px; font-size:11px; color:#6b7280; font-weight:600; text-transform:uppercase;">Quick Actions:</div>
          <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;">
            <button onclick="setAIInput('Yesterday HPCL ki kitni visits thin?')" style="background:#f3f4f6; border:1px solid #d1d5db; padding:4px 10px; border-radius:15px; font-size:11px; cursor:pointer; hover:bg-gray-200;">Yesterday's Plans</button>
            <button onclick="setAIInput('Pending incidents ki list dikhao')" style="background:#f3f4f6; border:1px solid #d1d5db; padding:4px 10px; border-radius:15px; font-size:11px; cursor:pointer;">Pending Incidents</button>
            <button onclick="setAIInput('Kitne record verified hain?')" style="background:#f3f4f6; border:1px solid #d1d5db; padding:4px 10px; border-radius:15px; font-size:11px; cursor:pointer;">Verified Stats</button>
          </div>
        </div>
      `;
          }
        } else {
          box.style.display = "none";
        }
      }

      // ⌨️ Helper to auto-fill input
      function setAIInput(text) {
        const input = document.getElementById("aiInput");
        input.value = text;
        input.focus();
      }

      async function sendAIMessage() {
        const input = document.getElementById("aiInput");
        const msg = input.value.trim();
        if (!msg) return;

        const messages = document.getElementById("aiMessages");
        const backendBaseUrl = "https://relcon-backend-jwt-backup.onrender.com"; // Aapka Base URL

        // User Message UI
        messages.innerHTML += `
    <div style="text-align:right;margin-bottom:8px;">
      <span style="background:#dcfce7;padding:8px 12px;border-radius:10px;display:inline-block;max-width:80%;box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        ${msg}
      </span>
    </div>
  `;
        input.value = "";
        messages.scrollTop = messages.scrollHeight;

        // Thinking... UI
        const thinkingId = "ai-thinking-" + Date.now();
        messages.innerHTML += `
    <div id="${thinkingId}" style="margin-bottom:10px;">
      <span style="background:#e5e7eb;padding:8px 12px;border-radius:10px;display:inline-block;font-style:italic;">
        🤖 AI is searching database...
      </span>
    </div>
  `;
        messages.scrollTop = messages.scrollHeight;

        try {
          const res = await fetch(`${backendBaseUrl}/ai/ask`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
            body: JSON.stringify({ question: msg }),
          });

          if (!res.ok) throw new Error("Server Error");

          const data = await res.json();
          document.getElementById(thinkingId).remove();

          // AI Response UI
          messages.innerHTML += `
      <div style="margin-bottom:15px; display:flex; gap:10px; align-items: flex-start;">
        <div style="background:#16a34a; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">🤖</div>
        <div style="background:#f1f5f9;padding:10px 14px;border-radius:12px;display:inline-block;max-width:85%;line-height:1.5; color:#1e293b; border: 1px solid #e2e8f0;">
          ${data.reply}
        </div>
      </div>
    `;
          messages.scrollTop = messages.scrollHeight;
        } catch (err) {
          if (document.getElementById(thinkingId))
            document.getElementById(thinkingId).remove();
          messages.innerHTML += `<div style="color:#ef4444; font-size:12px; margin: 10px 0; text-align:center;">❌ Connection failed. Check internet or backend.</div>`;
          console.error("AI Fetch Error:", err);
        }
      }
      function openChatBox() {
        document.getElementById("chatBox").style.display = "flex";
      }
    </script>
  </body>
</html>
