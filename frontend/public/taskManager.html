<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELCON | Task Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        color: #334155;
        font-size: 11px;
      }

      /* Compact Typography */
      .text-xxs {
        font-size: 9px;
      }
      .text-xs-compact {
        font-size: 10px;
        line-height: 1.2;
      }

      /* Professional Glow for Pending Action */
      @keyframes subtle-glow {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
      .pending-row {
        animation: subtle-glow 2.5s infinite;
        border-left: 3px solid #ef4444 !important;
      }

      .tab-btn {
        transition: all 0.2s;
        border-bottom: 2px solid transparent;
      }
      .tab-active {
        border-bottom-color: #4f46e5;
        color: #4f46e5;
        font-weight: 600;
        background: #eff6ff;
      }

      tr:hover {
        background-color: #f1f5f9;
        transition: background 0.1s;
      }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="p-4 md:p-6">
    <div class="max-w-[1550px] mx-auto">
      <!-- Header Section -->
      <div
        class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4"
      >
        <div>
          <h1
            class="text-xl font-bold text-slate-900 tracking-tight flex items-center gap-2"
          >
            <span class="bg-indigo-600 text-white p-1 rounded text-xs italic"
              >RL</span
            >
            Task Command Center
          </h1>
          <p
            class="text-slate-500 text-xxs font-semibold uppercase tracking-widest mt-0.5"
          >
            Automated HPCL Site Monitoring System
          </p>
        </div>
        <div class="flex gap-2">
          <button
            onclick="exportTasksToExcel()"
            class="bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded text-xs font-semibold hover:bg-slate-50 shadow-sm transition"
          >
            Export
          </button>
          <button
            onclick="fetchTasks()"
            class="bg-indigo-600 text-white px-3 py-1.5 rounded text-xs font-semibold hover:bg-indigo-700 shadow-md transition"
          >
            Sync Data
          </button>
        </div>
      </div>

      <!-- Dashboard Mini Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-3 rounded border border-slate-200 shadow-sm">
          <p class="text-slate-400 text-xxs font-bold uppercase">
            Global Tasks
          </p>
          <h3 id="statTotal" class="text-lg font-bold text-slate-800">0</h3>
        </div>
        <div
          class="bg-white p-3 rounded border border-slate-200 border-l-4 border-l-rose-500 shadow-sm"
        >
          <p class="text-rose-400 text-xxs font-bold uppercase">
            Pending Inbox
          </p>
          <h3 id="statPending" class="text-lg font-bold text-rose-600">0</h3>
        </div>
        <div
          class="bg-white p-3 rounded border border-slate-200 border-l-4 border-l-blue-500 shadow-sm"
        >
          <p class="text-blue-400 text-xxs font-bold uppercase">In Process</p>
          <h3 id="statActive" class="text-lg font-bold text-blue-600">0</h3>
        </div>
        <div
          class="bg-white p-3 rounded border border-slate-200 border-l-4 border-l-emerald-500 shadow-sm"
        >
          <p class="text-emerald-400 text-xxs font-bold uppercase">Resolved</p>
          <h3 id="statResolved" class="text-lg font-bold text-emerald-600">
            0
          </h3>
        </div>
      </div>

      <!-- Main Workspace -->
      <div
        class="bg-white rounded border border-slate-200 shadow-lg overflow-hidden"
      >
        <!-- Filter & Tabs Bar -->
        <div
          class="px-4 py-3 border-b border-slate-100 flex flex-col lg:flex-row justify-between items-center gap-4 bg-slate-50/50"
        >
          <div class="flex gap-2">
            <button
              onclick="switchTab('pending')"
              id="tabPending"
              class="tab-btn tab-active px-4 py-1.5 text-xs-compact uppercase tracking-wider"
            >
              Inbox (🚨 <span id="countPendingBadge">0</span>)
            </button>
            <button
              onclick="switchTab('active')"
              id="tabActive"
              class="tab-btn px-4 py-1.5 text-xs-compact uppercase tracking-wider text-slate-500"
            >
              Active Queue
            </button>
            <button
              onclick="switchTab('resolved')"
              id="tabResolved"
              class="tab-btn px-4 py-1.5 text-xs-compact uppercase tracking-wider text-slate-500"
            >
              History
            </button>
          </div>

          <div class="relative w-full lg:w-72">
            <input
              type="text"
              id="taskSearch"
              oninput="applyFilter()"
              placeholder="Filter sites..."
              class="w-full pl-8 pr-4 py-1.5 bg-white border border-slate-200 rounded text-xs focus:ring-2 focus:ring-indigo-500/10 outline-none"
            />
            <span class="absolute left-2.5 top-2 text-slate-400 text-xs"
              >🔍</span
            >
          </div>
        </div>

        <!-- Compact Table -->
        <div class="overflow-x-auto custom-scrollbar">
          <table class="w-full text-left border-collapse table-fixed">
            <thead
              class="bg-slate-50 text-slate-500 text-xxs font-bold uppercase border-b border-slate-100"
            >
              <tr>
                <th class="w-40 px-4 py-2.5 tracking-tighter">Site Details</th>
                <th class="w-20 px-4 py-2.5">Visit</th>
                <th class="w-60 px-4 py-2.5">Critical Observations</th>
                <th class="w-32 px-4 py-2.5">Engineer</th>
                <th class="w-20 px-4 py-2.5">Tool</th>
                <th class="w-48 px-4 py-2.5">Status & Timeline</th>
                <th class="w-24 px-4 py-2.5 text-center">Process</th>
              </tr>
            </thead>
            <tbody
              id="taskTableBody"
              class="text-xs-compact text-slate-600 divide-y divide-slate-50"
            >
              <!-- Data rows injected here -->
            </tbody>
          </table>
        </div>

        <!-- Pagination Footer -->
        <div
          class="px-4 py-3 bg-slate-50 border-t border-slate-100 flex justify-between items-center"
        >
          <p id="pageInfo" class="text-xxs font-bold text-slate-400 uppercase">
            Showing 0-0 of 0 Entries
          </p>
          <div id="paginationControls" class="flex items-center gap-1">
            <!-- Pagination buttons will be generated here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Professional Toast -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 hidden bg-slate-900 text-white px-5 py-2.5 rounded shadow-2xl text-xs font-medium z-50"
    ></div>

    <script>
      const baseUrl = "https://relcon-backend-jwt-backup.onrender.com";
      const token = localStorage.getItem("token");
      let allTasks = [];
      let filteredTasks = [];
      let currentTab = "pending";

      // Pagination State
      let currentPage = 1;
      const rowsPerPage = 10;

      async function fetchTasks() {
        try {
          const res = await fetch(`${baseUrl}/getTasks`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          allTasks = await res.json();
          updateStats();
          applyFilter();
        } catch (err) {
          showToast("❌ Sync failed");
        }
      }

      function updateStats() {
        const p = allTasks.filter((t) => t.status === "Pending").length;
        const a = allTasks.filter(
          (t) =>
            t.status === "Mailed" ||
            t.status === "Inprocess" ||
            t.status === "Follow-up",
        ).length;
        const r = allTasks.filter(
          (t) => t.status === "Resolved" || t.status === "Done",
        ).length;

        document.getElementById("statTotal").innerText = allTasks.length;
        document.getElementById("statPending").innerText = p;
        document.getElementById("statActive").innerText = a;
        document.getElementById("statResolved").innerText = r;
        document.getElementById("countPendingBadge").innerText = p;
      }

      function switchTab(tab) {
        currentTab = tab;
        currentPage = 1; // Reset pagination
        const tabs = ["Pending", "Active", "Resolved"];
        tabs.forEach((t) => {
          const el = document.getElementById(`tab${t}`);
          if (t.toLowerCase() === tab) el.classList.add("tab-active");
          else el.classList.remove("tab-active");
        });
        applyFilter();
      }

      function applyFilter() {
        const query = document.getElementById("taskSearch").value.toLowerCase();

        filteredTasks = allTasks.filter((task) => {
          const match =
            task.roCode.includes(query) ||
            task.roName.toLowerCase().includes(query) ||
            (task.region && task.region.toLowerCase().includes(query));
          if (currentTab === "pending")
            return match && task.status === "Pending";
          if (currentTab === "active")
            return (
              match &&
              ["Mailed", "Inprocess", "Follow-up"].includes(task.status)
            );
          if (currentTab === "resolved")
            return match && ["Resolved", "Done"].includes(task.status);
          return match;
        });

        renderTable();
      }

      function renderTable() {
        const tbody = document.getElementById("taskTableBody");
        tbody.innerHTML = "";

        // Pagination Logic
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedItems = filteredTasks.slice(start, end);

        if (paginatedItems.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-slate-400 font-medium">No records found.</td></tr>`;
          renderPagination(0);
          return;
        }

        paginatedItems.forEach((task) => {
          const row = document.createElement("tr");
          if (currentTab === "pending") row.classList.add("pending-row");

          let obs = [];
          if (task.earthingStatus !== "OK")
            obs.push(
              `<span class="text-rose-600 font-bold">⚡ Earth: ${task.earthingStatus}</span>`,
            );
          if (task.duOffline && task.duOffline !== "ALL OK")
            obs.push(
              `<span class="text-amber-600 font-bold">⛽ DU: ${task.duOffline}</span>`,
            );
          if (task.tankOffline && task.tankOffline !== "ALL OK")
            obs.push(
              `<span class="text-blue-500 font-bold">🛢️ Tank: ${task.tankOffline}</span>`,
            );

          row.innerHTML = `
                    <td class="px-4 py-2.5">
                        <div class="font-bold text-slate-900">${task.roCode}</div>
                        <div class="text-xxs text-slate-500 truncate">${task.roName}</div>
                        <div class="text-[8px] text-indigo-500 font-bold uppercase tracking-tighter">${task.region || ""}</div>
                    </td>
                    <td class="px-4 py-2.5 text-slate-500 font-medium">${task.date}</td>
                    <td class="px-4 py-2.5 leading-tight">${obs.join(" | ") || "-"}</td>
                    <td class="px-4 py-2.5"><span class="bg-slate-100 px-2 py-0.5 rounded text-xxs font-bold text-slate-600 tracking-tighter">${task.engineer}</span></td>
                    <td class="px-4 py-2.5"><button onclick="copyEmail('${task._id}')" class="bg-slate-800 text-white px-2 py-1 rounded text-[9px] font-bold hover:bg-black">DRAFT</button></td>
                    <td class="px-4 py-2.5">
                        <div class="flex items-center gap-1">
                            <select onchange="updateTaskStatus('${task._id}', this.value)" class="border border-slate-200 rounded p-0.5 text-[10px] font-bold text-slate-600 outline-none">
                                <option value="Pending" ${task.status === "Pending" ? "selected" : ""}>Pending</option>
                                <option value="Mailed" ${task.status === "Mailed" ? "selected" : ""}>Mailed</option>
                                <option value="Resolved" ${task.status === "Resolved" ? "selected" : ""}>Resolved</option>
                            </select>
                            <input type="date" value="${task.mailDate || ""}" onchange="updateTaskField('${task._id}', 'mailDate', this.value)" class="border border-slate-200 rounded p-0.5 text-[9px] outline-none">
                        </div>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                        ${
                          currentTab === "pending"
                            ? `
                            <button onclick="submitToActive('${task._id}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-[9px] font-bold hover:bg-indigo-700 shadow-sm">SUBMIT</button>
                        `
                            : task.status === "Resolved"
                              ? "✅"
                              : `
                             <select onchange="updateTaskField('${task._id}', 'completedBy', this.value)" class="border border-slate-200 rounded p-0.5 text-[9px] font-bold w-full">
                                <option value="">Assignee</option>
                                <option value="Anurag Mishra" ${task.completedBy === "Anurag Mishra" ? "selected" : ""}>Anurag</option>
                                <option value="Nikhil Trivedi" ${task.completedBy === "Nikhil Trivedi" ? "selected" : ""}>Nikhil</option>
                            </select>
                        `
                        }
                    </td>
                `;
          tbody.appendChild(row);
        });

        renderPagination(filteredTasks.length);
      }

      function renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / rowsPerPage);
        const controls = document.getElementById("paginationControls");
        const info = document.getElementById("pageInfo");

        controls.innerHTML = "";
        const start =
          totalItems === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
        const end = Math.min(currentPage * rowsPerPage, totalItems);
        info.innerText = `Showing ${start}-${end} of ${totalItems} Entries`;

        if (totalPages <= 1) return;

        // Prev Button
        const prev = document.createElement("button");
        prev.innerText = "‹";
        prev.disabled = currentPage === 1;
        prev.className = `px-2 py-1 rounded border ${currentPage === 1 ? "text-slate-300" : "text-slate-600 hover:bg-slate-100"} text-xs font-bold`;
        prev.onclick = () => {
          currentPage--;
          renderTable();
        };
        controls.appendChild(prev);

        // Page Numbers (limited)
        for (let i = 1; i <= totalPages; i++) {
          if (
            i === 1 ||
            i === totalPages ||
            (i >= currentPage - 1 && i <= currentPage + 1)
          ) {
            const pBtn = document.createElement("button");
            pBtn.innerText = i;
            pBtn.className = `px-2 py-1 rounded border text-xs font-bold ${i === currentPage ? "bg-indigo-600 text-white border-indigo-600" : "text-slate-600 hover:bg-slate-100"}`;
            pBtn.onclick = () => {
              currentPage = i;
              renderTable();
            };
            controls.appendChild(pBtn);
          }
        }

        // Next Button
        const next = document.createElement("button");
        next.innerText = "›";
        next.disabled = currentPage === totalPages;
        next.className = `px-2 py-1 rounded border ${currentPage === totalPages ? "text-slate-300" : "text-slate-600 hover:bg-slate-100"} text-xs font-bold`;
        next.onclick = () => {
          currentPage++;
          renderTable();
        };
        controls.appendChild(next);
      }

      async function submitToActive(id) {
        const t = allTasks.find((x) => x._id === id);
        if (!t.mailDate) return showToast("⚠️ Mail Date Required");

        await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status: "Mailed", followUp: true }),
        });
        showToast("🚀 Task Pushed to Active Queue");
        fetchTasks();
      }

      async function updateTaskStatus(id, status) {
        await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status }),
        });
        showToast(`Status: ${status}`);
        fetchTasks();
      }

      async function updateTaskField(id, field, value) {
        await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ [field]: value }),
        });
        const t = allTasks.find((x) => x._id === id);
        if (t) t[field] = value;
        showToast("Sync Successful");
      }

      async function copyEmail(id) {
        const task = allTasks.find((t) => t._id === id);
        if (task?.emailContent) {
          await navigator.clipboard.writeText(task.emailContent);
          showToast("📋 Draft Copied");
        }
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 3000);
      }

      function exportTasksToExcel() {
        const ws = XLSX.utils.json_to_sheet(allTasks);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TaskMaster");
        XLSX.writeFile(
          wb,
          `Relcon_Pro_Report_${new Date().toLocaleDateString()}.xlsx`,
        );
      }

      window.onload = fetchTasks;
    </script>
  </body>
</html>
