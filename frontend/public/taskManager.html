<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELCON | Enterprise Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f4f7fa;
        color: #1e293b;
      }

      /* Glow Animation for Urgent Pending Tasks */
      @keyframes pulse-red {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
      .urgent-glow {
        animation: pulse-red 2s infinite;
        border: 1px solid #fee2e2;
      }

      .tab-active {
        border-bottom: 3px solid #4f46e5;
        color: #4f46e5;
        background-color: rgba(79, 70, 229, 0.05);
        font-weight: 700;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div class="max-w-[1600px] mx-auto">
      <!-- TOP HEADER -->
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4"
      >
        <div>
          <div class="flex items-center gap-3">
            <span class="text-3xl">🚀</span>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">
              Task Command Center
            </h1>
          </div>
          <p class="text-slate-500 mt-1 ml-10">
            Manage, Track and Resolve HPCL site issues efficiently.
          </p>
        </div>
        <div class="flex gap-3">
          <button
            onclick="exportTasksToExcel()"
            class="bg-white text-slate-700 border border-slate-200 px-5 py-2.5 rounded-xl hover:bg-slate-50 transition shadow-sm font-semibold flex items-center gap-2"
          >
            📥 Export Report
          </button>
          <button
            onclick="fetchTasks()"
            class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition shadow-md font-semibold flex items-center gap-2"
          >
            🔄 Sync Data
          </button>
        </div>
      </div>

      <!-- DASHBOARD STATS -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div
          class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-slate-400"
        >
          <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">
            Global Tasks
          </p>
          <h3 id="statTotal" class="text-3xl font-black text-slate-800 mt-2">
            0
          </h3>
        </div>
        <div
          class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-red-500"
        >
          <p class="text-red-500 text-xs font-bold uppercase tracking-widest">
            Pending Action
          </p>
          <h3 id="statPending" class="text-3xl font-black text-red-600 mt-2">
            0
          </h3>
        </div>
        <div
          class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-blue-500"
        >
          <p class="text-blue-500 text-xs font-bold uppercase tracking-widest">
            Active / Mailed
          </p>
          <h3 id="statActive" class="text-3xl font-black text-blue-600 mt-2">
            0
          </h3>
        </div>
        <div
          class="glass-card p-6 rounded-2xl shadow-sm border-t-4 border-t-emerald-500"
        >
          <p
            class="text-emerald-500 text-xs font-bold uppercase tracking-widest"
          >
            Resolved
          </p>
          <h3
            id="statResolved"
            class="text-3xl font-black text-emerald-600 mt-2"
          >
            0
          </h3>
        </div>
      </div>

      <!-- MAIN CONTENT AREA -->
      <div
        class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden"
      >
        <!-- TAB NAVIGATION & SEARCH -->
        <div
          class="p-6 border-b border-slate-100 flex flex-col lg:flex-row justify-between items-center gap-6 bg-slate-50/50"
        >
          <div class="flex p-1 bg-slate-200/50 rounded-2xl w-full lg:w-auto">
            <button
              onclick="switchTab('pending')"
              id="tabPending"
              class="flex-1 lg:flex-none px-6 py-3 rounded-xl text-sm transition-all duration-200 tab-active"
            >
              🚨 Pending Action
              <span
                id="countPendingBadge"
                class="ml-2 bg-red-100 text-red-600 px-2 py-0.5 rounded-md text-[10px]"
                >0</span
              >
            </button>
            <button
              onclick="switchTab('active')"
              id="tabActive"
              class="flex-1 lg:flex-none px-6 py-3 rounded-xl text-sm transition-all duration-200 text-slate-500 hover:text-slate-700"
            >
              ⚙️ Active Tasks
            </button>
            <button
              onclick="switchTab('resolved')"
              id="tabResolved"
              class="flex-1 lg:flex-none px-6 py-3 rounded-xl text-sm transition-all duration-200 text-slate-500 hover:text-slate-700"
            >
              ✅ Resolved History
            </button>
          </div>

          <div class="relative w-full lg:w-96">
            <input
              type="text"
              id="taskSearch"
              oninput="applyFilter()"
              placeholder="Search site, code or region..."
              class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm"
            />
            <span class="absolute left-4 top-4 text-slate-400">🔍</span>
          </div>
        </div>

        <!-- TABLE -->
        <div class="overflow-x-auto custom-scrollbar">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="bg-slate-50/80 text-slate-500 uppercase text-[11px] font-bold tracking-widest"
              >
                <th class="px-6 py-5 border-b">Site Information</th>
                <th class="px-6 py-5 border-b">Visit Date</th>
                <th class="px-6 py-5 border-b">Observations</th>
                <th class="px-6 py-5 border-b">Engineer</th>
                <th class="px-6 py-5 border-b">Actions & Tools</th>
                <th class="px-6 py-5 border-b">Mail Status</th>
                <th class="px-6 py-5 border-b text-center">Process</th>
              </tr>
            </thead>
            <tbody
              id="taskTableBody"
              class="text-[12px] text-slate-700 divide-y divide-slate-100"
            >
              <!-- Dynamic Content -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div
      id="toast"
      class="fixed bottom-8 right-8 hidden bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl transition-all duration-500 transform translate-y-0 z-50 font-medium"
    ></div>

    <script>
      const baseUrl = "https://relcon-backend-jwt-backup.onrender.com";
      const token = localStorage.getItem("token");
      let allTasks = [];
      let currentTab = "pending";

      async function fetchTasks() {
        try {
          const res = await fetch(`${baseUrl}/getTasks`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          allTasks = await res.json();
          updateStats();
          applyFilter();
        } catch (err) {
          showToast("❌ Connection error. Please refresh.");
        }
      }

      function updateStats() {
        const pCount = allTasks.filter((t) => t.status === "Pending").length;
        const aCount = allTasks.filter(
          (t) => t.status === "Mailed" || t.status === "Inprocess",
        ).length;
        const rCount = allTasks.filter(
          (t) => t.status === "Resolved" || t.status === "Done",
        ).length;

        document.getElementById("statTotal").innerText = allTasks.length;
        document.getElementById("statPending").innerText = pCount;
        document.getElementById("statActive").innerText = aCount;
        document.getElementById("statResolved").innerText = rCount;
        document.getElementById("countPendingBadge").innerText = pCount;
      }

      function switchTab(tab) {
        currentTab = tab;
        const tabs = ["Pending", "Active", "Resolved"];
        tabs.forEach((t) => {
          const el = document.getElementById(`tab${t}`);
          if (t.toLowerCase() === tab) {
            el.className =
              "flex-1 lg:flex-none px-6 py-3 rounded-xl text-sm transition-all duration-200 tab-active";
          } else {
            el.className =
              "flex-1 lg:flex-none px-6 py-3 rounded-xl text-sm transition-all duration-200 text-slate-500 hover:text-slate-700";
          }
        });
        applyFilter();
      }

      function applyFilter() {
        const query = document.getElementById("taskSearch").value.toLowerCase();
        const user = JSON.parse(localStorage.getItem("user")) || {};
        const isAdmin = user.role === "admin";

        let filtered = allTasks.filter((task) => {
          const matchesSearch =
            task.roCode.includes(query) ||
            task.roName.toLowerCase().includes(query) ||
            task.region.toLowerCase().includes(query);

          if (currentTab === "pending")
            return matchesSearch && task.status === "Pending";
          if (currentTab === "active")
            return (
              matchesSearch &&
              (task.status === "Mailed" ||
                task.status === "Inprocess" ||
                task.status === "Follow-up")
            );
          if (currentTab === "resolved")
            return (
              matchesSearch &&
              (task.status === "Resolved" || task.status === "Done")
            );
          return matchesSearch;
        });

        renderTable(filtered, isAdmin);
      }

      function renderTable(tasks, isAdmin) {
        const tbody = document.getElementById("taskTableBody");
        tbody.innerHTML = "";

        if (tasks.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="text-center py-20 text-slate-400 font-medium italic">No tasks found in this category.</td></tr>`;
          return;
        }

        tasks.forEach((task) => {
          const row = document.createElement("tr");
          row.className =
            currentTab === "pending"
              ? "urgent-glow hover:bg-slate-50"
              : "hover:bg-slate-50";

          let obs = [];
          if (task.earthingStatus !== "OK")
            obs.push(
              `<span class="text-red-600 font-bold">⚡ Earthing: ${task.earthingStatus}</span>`,
            );
          if (task.duOffline && task.duOffline !== "ALL OK")
            obs.push(
              `<span class="text-orange-600 font-bold">⛽ DU Off: ${task.duOffline}</span>`,
            );
          if (task.tankOffline && task.tankOffline !== "ALL OK")
            obs.push(
              `<span class="text-blue-600 font-bold">🛢️ Tank Off: ${task.tankOffline}</span>`,
            );

          row.innerHTML = `
                    <td class="px-6 py-5">
                        <div class="font-black text-slate-800 text-[14px]">${task.roCode}</div>
                        <div class="text-[11px] text-slate-500 font-medium uppercase mt-0.5">${task.roName}</div>
                        <div class="text-[10px] text-indigo-500 font-bold mt-1">${task.region}</div>
                    </td>
                    <td class="px-6 py-5 font-semibold text-slate-600">${task.date}</td>
                    <td class="px-6 py-5 leading-relaxed">${obs.join("<br>") || '<span class="text-slate-300">No critical issues</span>'}</td>
                    <td class="px-6 py-5"><span class="bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-600">${task.engineer}</span></td>
                    <td class="px-6 py-5">
                        <button onclick="copyEmail('${task._id}')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold hover:scale-105 transition active:scale-95 shadow-lg">
                           📋 COPY EMAIL
                        </button>
                    </td>
                    <td class="px-6 py-5">
                        <div class="flex flex-col gap-2">
                             <select onchange="updateTaskStatus('${task._id}', this.value)" class="border-2 border-slate-200 rounded-lg p-1.5 focus:border-indigo-500 outline-none font-bold text-slate-600">
                                <option value="Pending" ${task.status === "Pending" ? "selected" : ""}>Pending</option>
                                <option value="Mailed" ${task.status === "Mailed" ? "selected" : ""}>Mailed</option>
                                <option value="Resolved" ${task.status === "Resolved" ? "selected" : ""}>Resolved</option>
                            </select>
                            <input type="date" value="${task.mailDate || ""}" onchange="updateTaskField('${task._id}', 'mailDate', this.value)" class="border-2 border-slate-200 rounded-lg p-1 text-[11px] font-medium outline-none">
                        </div>
                    </td>
                    <td class="px-6 py-5 text-center">
                        ${
                          currentTab === "pending"
                            ? `
                            <button onclick="submitToActive('${task._id}')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-black text-[10px] hover:bg-indigo-700 shadow-lg shadow-indigo-200">
                                SUBMIT
                            </button>
                        `
                            : task.status === "Resolved"
                              ? '<span class="text-xl">✅</span>'
                              : `
                             <select onchange="updateTaskField('${task._id}', 'completedBy', this.value)" class="border-2 border-slate-200 rounded-lg p-1.5 text-[10px] font-bold">
                                <option value="">Assignee</option>
                                <option value="Anurag Mishra" ${task.completedBy === "Anurag Mishra" ? "selected" : ""}>Anurag</option>
                                <option value="Nikhil Trivedi" ${task.completedBy === "Nikhil Trivedi" ? "selected" : ""}>Nikhil</option>
                            </select>
                        `
                        }
                    </td>
                `;
          tbody.appendChild(row);
        });
      }

      // Feature: Pending से Active में भेजने का नया फंक्शन
      async function submitToActive(id) {
        const task = allTasks.find((t) => t._id === id);

        // Validation
        if (!task.mailDate) {
          showToast("⚠️ Please select Mail Date first!");
          return;
        }

        const res = await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            status: "Mailed", // Status change
            followUp: true,
          }),
        });

        if (res.ok) {
          showToast("🚀 Task moved to Active Queue!");
          fetchTasks(); // Refresh
        }
      }

      async function updateTaskStatus(id, status) {
        await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status }),
        });
        showToast(`Status: ${status}`);
        fetchTasks();
      }

      async function updateTaskField(id, field, value) {
        await fetch(`${baseUrl}/updateTask/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ [field]: value }),
        });
        const t = allTasks.find((x) => x._id === id);
        if (t) t[field] = value; // Update local data
        showToast("Updated successfully");
      }

      async function copyEmail(id) {
        const task = allTasks.find((t) => t._id === id);
        if (task?.emailContent) {
          await navigator.clipboard.writeText(task.emailContent);
          showToast("📋 Draft Copied to Clipboard!");
        }
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 3000);
      }

      function exportTasksToExcel() {
        const ws = XLSX.utils.json_to_sheet(allTasks);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TaskReport");
        XLSX.writeFile(
          wb,
          `Relcon_Tasks_${new Date().toLocaleDateString()}.xlsx`,
        );
      }

      window.onload = fetchTasks;
    </script>
  </body>
</html>
